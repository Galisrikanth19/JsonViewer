<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .tabs {
            background: #f0f0f0;
            display: flex;
        }

        .tab {
            padding: 8px 20px;
            cursor: pointer;
            border-bottom: none;
            margin-right: 2px;
            background: #d0d0d0;
            color: #333;
            font-size: 14px;
        }

        .tab.active {
            background: yellow;
            border-bottom: 1px solid white;
            position: relative;
            z-index: 1;
        }

        .toolbar {
            background: #f0f0f0;
            border-bottom: 1px solid #ccc;
            padding: 8px 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .toolbar button {
            padding: 5px 12px;
            background: #fff;
            border: 1px solid #aaa;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }

        .toolbar button:hover {
            background: #e8e8e8;
            border-color: #888;
        }

        .toolbar button:active {
            background: #d0d0d0;
        }

        .content-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            background: white;
        }

        .text-view {
            width: 100%;
            display: none;
        }

        .text-view.active {
            display: flex;
            flex-direction: column;
        }

        #textInput {
            flex: 1;
            border: none;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            resize: none;
            outline: none;
        }

        .viewer-view {
            width: 100%;
            display: none;
            overflow: auto;
            padding: 10px;
        }

        .viewer-view.active {
            display: block;
        }

        .json-tree {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .json-line {
            padding-left: 20px;
        }

        .json-key {
            color: #000080;
        }

        .json-string {
            color: #008000;
        }

        .json-number {
            color: #0000ff;
        }

        .json-boolean {
            color: #ff0000;
            font-weight: bold;
        }

        .json-null {
            color: #808080;
        }

        .json-expandable {
            cursor: pointer;
            user-select: none;
        }

        .json-toggle {
            display: inline-block;
            width: 12px;
            height: 12px;
            vertical-align: middle;
        }

        .json-toggle img {
            width: 12px;
            height: 12px;
            vertical-align: middle;
            margin-top: -10px;
        }

        .json-collapsed {
            display: none;
        }

        .json-bracket {
            color: #000;
        }

        .error-box {
            background: #ffe0e0;
            border: 1px solid #ff0000;
            color: #cc0000;
            padding: 15px;
            margin: 10px;
            border-radius: 3px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 50px;
            font-size: 14px;
        }

        .file-input {
            display: none;
        }

        .toolbar-right {
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab" data-tab="viewer" onclick="switchTab('viewer')">Viewer</div>
        <div class="tab active" data-tab="text" onclick="switchTab('text')">Text</div>
    </div>

    <div class="toolbar">
        <button onclick="pasteFromClipboard()">Paste</button>
        <button onclick="copyToClipboard()">Copy</button>
        <button onclick="formatJSON()">Format</button>
        <button onclick="removeWhitespace()">Remove white space</button>
        <button onclick="clearAll()">Clear</button>
        <button onclick="document.getElementById('fileInput').click()">Load JSON data</button>
        <input type="file" id="fileInput" class="file-input" accept=".json" onchange="loadFile(event)">
        <button class="toolbar-right" onclick="showAbout()">About</button>
    </div>

    <div class="content-area">
        <div class="viewer-view" id="viewerView">
            <div class="empty-state">
                Paste JSON data or load from file to view
            </div>
        </div>
        <div class="text-view active" id="textView">
            <textarea id="textInput" placeholder="Paste or type JSON here..."></textarea>
        </div>
    </div>

    <script>
        let currentData = null;

        function switchTab(tab) {
            // Update tab styling
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
            });
            document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');

            // Update view
            document.querySelectorAll('.viewer-view, .text-view').forEach(v => {
                v.classList.remove('active');
            });

            if (tab === 'viewer') {
                document.getElementById('viewerView').classList.add('active');
            } else {
                document.getElementById('textView').classList.add('active');
            }
        }

        function pasteFromClipboard() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('textInput').value = text;
                parseAndDisplay();
            }).catch(err => {
                alert('Unable to read from clipboard. Please paste manually.');
            });
        }

        function copyToClipboard() {
            const text = document.getElementById('textInput').value;
            if (!text) {
                alert('Nothing to copy');
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard');
            }).catch(err => {
                alert('Failed to copy to clipboard');
            });
        }

        function formatJSON() {
            const input = document.getElementById('textInput').value.trim();
            if (!input) return;

            try {
                const parsed = JSON.parse(input);
                document.getElementById('textInput').value = JSON.stringify(parsed, null, 2);
                parseAndDisplay();
            } catch (error) {
                alert('Invalid JSON: ' + error.message);
            }
        }

        function removeWhitespace() {
            const input = document.getElementById('textInput').value.trim();
            if (!input) return;

            try {
                const parsed = JSON.parse(input);
                document.getElementById('textInput').value = JSON.stringify(parsed);
                parseAndDisplay();
            } catch (error) {
                alert('Invalid JSON: ' + error.message);
            }
        }

        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('viewerView').innerHTML = '<div class="empty-state">Paste JSON data or load from file to view</div>';
            currentData = null;
        }

        function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('textInput').value = e.target.result;
                parseAndDisplay();
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset file input
        }

        function showAbout() {
            alert('JSON Viewer\n\nA simple tool to view and format JSON data.\n\nFeatures:\n- View JSON in tree structure\n- Format and minify JSON\n- Load from file\n- Copy to clipboard');
        }

        function parseAndDisplay() {
            const input = document.getElementById('textInput').value.trim();
            const viewerView = document.getElementById('viewerView');

            if (!input) {
                viewerView.innerHTML = '<div class="empty-state">Paste JSON data or load from file to view</div>';
                currentData = null;
                return;
            }

            try {
                currentData = JSON.parse(input);
                displayTree(currentData);
            } catch (error) {
                viewerView.innerHTML = `<div class="error-box">Error: ${escapeHtml(error.message)}</div>`;
                currentData = null;
            }
        }

        function displayTree(data) {
            const viewerView = document.getElementById('viewerView');
            const tree = document.createElement('div');
            tree.className = 'json-tree';
            tree.innerHTML = renderValue(data, 0);
            viewerView.innerHTML = '';
            viewerView.appendChild(tree);
        }

        function renderValue(value, depth) {
            if (value === null) {
                return `<span class="json-null">null</span>`;
            }

            if (typeof value === 'boolean') {
                return `<span class="json-boolean">${value}</span>`;
            }

            if (typeof value === 'number') {
                return `<span class="json-number">${value}</span>`;
            }

            if (typeof value === 'string') {
                return `<span class="json-string">"${escapeHtml(value)}"</span>`;
            }

            if (Array.isArray(value)) {
                if (value.length === 0) {
                    return `<span class="json-bracket">[]</span>`;
                }

                const id = 'node_' + Math.random().toString(36).substr(2, 9);
                let html = `<span class="json-expandable" onclick="toggleNode('${id}')">`;
                html += `<span class="json-toggle" id="toggle_${id}"><img src="plus.png" alt="+"></span>`;
                html += `<span class="json-bracket">[</span>`;
                html += `</span>`;
                html += `<div class="json-line json-collapsed" id="${id}">`;

                value.forEach((item, index) => {
                    html += `<div>`;
                    html += renderValue(item, depth + 1);
                    if (index < value.length - 1) html += '<span class="json-bracket">,</span>';
                    html += `</div>`;
                });

                html += `</div>`;
                html += `<span class="json-bracket">]</span>`;
                return html;
            }

            if (typeof value === 'object') {
                const keys = Object.keys(value);
                if (keys.length === 0) {
                    return `<span class="json-bracket">{}</span>`;
                }

                const id = 'node_' + Math.random().toString(36).substr(2, 9);
                let html = `<span class="json-expandable" onclick="toggleNode('${id}')">`;
                html += `<span class="json-toggle" id="toggle_${id}"><img src="plus.png" alt="+"></span>`;
                html += `<span class="json-bracket">{</span>`;
                html += `</span>`;
                html += `<div class="json-line json-collapsed" id="${id}">`;

                keys.forEach((key, index) => {
                    html += `<div>`;
                    html += `<span class="json-key">${escapeHtml(key)}</span>: `;
                    html += renderValue(value[key], depth + 1);
                    if (index < keys.length - 1) html += '<span class="json-bracket">,</span>';
                    html += `</div>`;
                });

                html += `</div>`;
                html += `<span class="json-bracket">}</span>`;
                return html;
            }

            return String(value);
        }

        function toggleNode(id) {
            const node = document.getElementById(id);
            const toggle = document.getElementById('toggle_' + id);
            const img = toggle.querySelector('img');

            if (node.classList.contains('json-collapsed')) {
                node.classList.remove('json-collapsed');
                img.src = 'minus.png';
                img.alt = '-';
            } else {
                node.classList.add('json-collapsed');
                img.src = 'plus.png';
                img.alt = '+';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-parse when switching to viewer tab
        document.addEventListener('keyup', function(e) {
            if (e.target.id === 'textInput') {
                // Auto-parse after typing (with debounce would be better for large JSON)
                clearTimeout(window.parseTimeout);
                window.parseTimeout = setTimeout(parseAndDisplay, 500);
            }
        });

        // Parse on initial load if there's content
        window.addEventListener('load', function() {
            const input = document.getElementById('textInput').value;
            if (input.trim()) {
                parseAndDisplay();
            }
        });
    </script>
</body>
</html>
